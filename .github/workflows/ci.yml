name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install (build-time @boardstate/* from npm)
        run: npm ci

      - name: Build (web tab + sidecar + vendored element bundle)
        run: npm run build

      - name: Sidecar smoke test (control plane + nonce gate)
        run: node test/sidecar-smoke.mjs

      - name: MCP single-host liveness (agent tool call → live board update)
        run: node test/mcp-liveness.mjs

      - name: Broker wiring (config → connect → discover → request → read, headless)
        run: node test/broker-fixture.mjs

      - name: Operational e2e (request → approve → invoke → park → confirm → result)
        run: node test/operational-e2e.mjs

      - name: Secret redaction (connector config never reaches the agent MCP surface)
        run: node test/secret-redaction.mjs

      - name: Anti-rug-pull (manifest drift re-pends the grant, never executes)
        run: node test/rugpull-repend.mjs

      - name: Hermes data resolver wire-contract (rpc bindings → REST fixture)
        run: node test/hermes-data.mjs

      - name: Chat event translator (Hermes stream → §14 AgentStreamEvent)
        run: node test/chat-translate.mjs

      - name: Theme adapter (Hermes palette tokens → --bs-* mapping)
        run: node test/theme.mjs

      - name: Web skin (Hermes design language in the shipped bundle)
        run: node test/skin-web.mjs

      - name: Board templates (each is a schema-valid, allowlisted workspace)
        run: node test/templates.mjs

      - name: OfficeCLI preset (detect-or-instruct, stamps a valid connector)
        run: node test/officecli-preset.mjs

      - name: Desktop plugin bundle (loader-safe imports + contract + inlined boardstate)
        run: node test/desktop-plugin.mjs

      - name: Operator UX wiring (web + desktop route approve/confirm through the gate)
        run: node test/operator-ux.mjs

      - name: Assert built artifacts committed and in sync
        run: |
          git diff --exit-code -- dashboard/dist dashboard/desktop dashboard/sidecar dashboard/vendor \
            || (echo "::error::Built artifacts are stale — run 'npm run build' and commit." && exit 1)

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend test deps
        run: pip install fastapi websockets httpx

      - name: Byte-compile the plugin backend
        run: python -m py_compile dashboard/plugin_api.py

      - name: Router import + shape check (no Hermes host required)
        run: python test/plugin_api_check.py

      - name: Operator gate wire-contract (plugin_api → sidecar exact param shapes)
        run: python test/operator_wire.py
